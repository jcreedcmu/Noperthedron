name = "Noperthedron"
defaultTargets = ["Noperthedron"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.style.multiGoal = true
weak.linter.style.cdot = true

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[require]]
name = "tryAtEachStep"
git = "https://github.com/dwrensha/tryAtEachStep"
rev = "main"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
rev = "master"

[[lean_lib]]
name = "Noperthedron"

# Build-on-demand verification of the expensive computational step; not in
# defaultTargets so CI never pays for it. See Noperthedron/ComputationalStep.lean.
[[lean_lib]]
name = "VerifiedNative"

[[lean_lib]]
name = "VerifiedKernel"

# Patched copy of the `checkdecls` dependency's executable (see CheckDecls.lean):
# checks blueprint declarations against the defaultTargets libraries only, so
# the build-on-demand VerifiedNative/VerifiedKernel libs don't break CI.
# Defined in the root package so `lake exe checkdecls` resolves to it.
[[lean_exe]]
name = "checkdecls"
root = "CheckDecls"
supportInterpreter = true
weakLinkArgs = ["-lLake"]

[[lean_exe]]
name = "constructValidTable"
root = "constructValidTable"
buildType = "release"
[[lean_exe]]
name = "benchRows"
root = "benchRows"
buildType = "release"
